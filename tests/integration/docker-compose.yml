services:
  cassandra:
    image: cassandra:5.0
    container_name: async-cassandra-test
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - HEAP_NEWSIZE=3G
      - MAX_HEAP_SIZE=12G
      - JVM_OPTS=-XX:+UseG1GC -XX:G1RSetUpdatingPauseTimePercent=5 -XX:MaxGCPauseMillis=300
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 16G
    healthcheck:
      test: ["CMD", "nodetool", "info"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
